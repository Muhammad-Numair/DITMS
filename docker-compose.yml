version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT:          5000
      NODE_ENV:      production
      CLIENT_URL:    "*"
      
      # Connected to the secure inputs we will fill out on Koyeb's dashboard
      PG_HOST:       ${PG_HOST}
      PG_PORT:       5432
      PG_DATABASE:   ${PG_DATABASE}
      PG_USER:       ${PG_USER}
      PG_PASSWORD:   ${PG_PASSWORD}
      
      MONGO_URI:     ${MONGO_URI}
      
      NEO4J_URI:     ${NEO4J_URI}
      NEO4J_USER:    ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      
      REDIS_URL:     ${REDIS_URL}
      JWT_SECRET:    ${JWT_SECRET}
